version: "3.9"

services:

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: pc_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/people_counter
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      SPRING_FLYWAY_LOCATIONS: classpath:db/migrations
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "3"
      JWT_SECRET: ${JWT_SECRET:-zYm4bSUFWjGPLpPu/2OULWEwvFJ4drlqytBVqHXTUUb1CDg8416XoDKRcV+CXfinDEmjmG2OI3sAkRvZjJDLsA==}
      APP_API_KEY: ${APP_API_KEY:-dev-secret-key}
      APP_ADMIN_USERNAME: ${APP_ADMIN_USERNAME:-admin}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-admin123}
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost:9091
      JAVA_TOOL_OPTIONS: "-Duser.timezone=GMT+07:00"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # cần dòng này trên Linux; vô hại trên Windows/Mac (Docker Desktop tự có sẵn)
    ports:
      - "9090:8080"

  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: pc_ai_service
    depends_on:
      - backend
    environment:
      HEADLESS: "true"
      BACKEND_URL: http://backend:8080
      API_KEY: ${APP_API_KEY:-dev-secret-key}
    volumes:
      - ../ai-service/datasets:/app/datasets
      - ../ai-service/output:/app/output

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:9090
    container_name: pc_frontend
    depends_on:
      - backend
    ports:
      - "9091:80"

