version: "3.9"

services:

  backend:
    image: maven:3.9-eclipse-temurin-21
    container_name: pc_backend_dev
    working_dir: /app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/people_counter
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      SPRING_FLYWAY_LOCATIONS: classpath:db/migrations
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "3"
      JWT_SECRET: ${JWT_SECRET:-zYm4bSUFWjGPLpPu/2OULWEwvFJ4drlqytBVqHXTUUb1CDg8416XoDKRcV+CXfinDEmjmG2OI3sAkRvZjJDLsA==}
      APP_API_KEY: ${APP_API_KEY:-dev-secret-key}
      APP_ADMIN_USERNAME: ${APP_ADMIN_USERNAME:-admin}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-admin123}
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
      JAVA_TOOL_OPTIONS: "-Duser.timezone=GMT+07:00"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../backend:/app
      - pc_maven_cache:/root/.m2
    ports:
      - "9090:8080"
    command: mvn spring-boot:run

  ai-service:
    image: python:3.11-slim
    container_name: pc_ai_service_dev
    working_dir: /app
    depends_on:
      - backend
    environment:
      HEADLESS: "true"
      BACKEND_URL: http://backend:8080
      API_KEY: ${APP_API_KEY:-dev-secret-key}
    volumes:
      - ../ai-service:/app

    command: >
      bash -c "apt-get update && apt-get install -y libgl1 libglib2.0-0 &&
               pip install --no-cache-dir -r requirements.txt &&
               python app.py"

  frontend:
    image: node:20-alpine
    container_name: pc_frontend_dev
    working_dir: /app
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:9090
    volumes:
      - ../frontend:/app
      - pc_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  pc_maven_cache:
  pc_node_modules:
