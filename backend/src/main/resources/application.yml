spring:
  application:
    name: people-counter-backend

  # Database
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:people_counter}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate        # Flyway manages the schema; JPA only validates it.
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migrations
    baseline-on-migrate: true

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Ho_Chi_Minh
    default-property-inclusion: non_null

# Server
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# JWT
app:
  jwt:
    secret: cGVvcGxlLWNvdW50ZXItc2VjcmV0LWtleS1taW4tMzJjaGFycw==
    expiration: 86400000
  api-key: people-counter-api-key

# Logging
logging:
  level:
    com.peoplecounter: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    enabled: true
